<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora de Interés Pro</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success: #10b981;
            --accent: #3b82f6;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 1.5rem;
            margin: 0;
            color: var(--primary);
        }

        .card {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            box-sizing: border-box;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 18px;
            color: var(--text-main);
        }

        .info-pill {
            background: #eff6ff;
            color: #1e40af;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            margin-left: 4px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s ease;
            box-sizing: border-box;
            background-color: #fcfcfc;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .result-area {
            margin-top: 20px;
            padding: 18px;
            border-radius: 15px;
            text-align: center;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .res-1 { background-color: #f0fdf4; border: 1px solid #dcfce7; }
        .res-2 { background-color: #eff6ff; border: 1px solid #dbeafe; }

        .res-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .res-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .res-detail {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        hr {
            border: 0;
            border-top: 1px solid #f1f5f9;
            margin: 25px 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📊 Mis Finanzas</h1>
    </div>

    <div class="card">
        <div class="section-title">📅 Desde el 27/01/2026</div>
        <div class="info-pill">
            Calcula el rendimiento anualizado real basado en los días que han pasado hasta hoy.
        </div>
        
        <div class="input-group">
            <label>Capital Inicial</label>
            <input type="number" id="cap1" placeholder="0.00 €" oninput="calcFija()" inputmode="decimal">
        </div>
        
        <div class="input-group">
            <label>Intereses Acumulados</label>
            <input type="number" id="int1" placeholder="0.00 €" oninput="calcFija()" inputmode="decimal">
        </div>

        <div id="resBox1" class="result-area res-1">
            <div class="res-label">Rendimiento (TAE)</div>
            <div id="tasaAnual1" class="res-value" style="color: #166534;">0.00%</div>
            <div id="diasInfo" class="res-detail"></div>
        </div>
    </div>

    <div class="card">
        <div class="section-title">📈 Proyección Mensual</div>
        <div class="info-pill">
            Calcula cuánto ganarías en un año manteniendo este ritmo mensual.
        </div>
        
        <div class="input-group">
            <label>Capital del mes</label>
            <input type="number" id="cap2" placeholder="0.00 €" oninput="calcMensual()" inputmode="decimal">
        </div>
        
        <div class="input-group">
            <label>Intereses del mes</label>
            <input type="number" id="int2" placeholder="0.00 €" oninput="calcMensual()" inputmode="decimal">
        </div>

        <div id="resBox2" class="result-area res-2">
            <div class="res-label">Tasa Anual Proyectada</div>
            <div id="tasaAnual2" class="res-value" style="color: #1e40af;">0.00%</div>
            <div class="res-detail">Estimación basada en 12 meses</div>
        </div>
    </div>

<script>
    // Fecha de inicio fija: 27 de enero de 2026
    const FECHA_INICIO = new Date('2026-01-27');
    const hoy = new Date();

    function calcFija() {
        const cap = parseFloat(document.getElementById('cap1').value);
        const inter = parseFloat(document.getElementById('int1').value);
        const box = document.getElementById('resBox1');

        if (cap > 0 && inter >= 0) {
            const diferencia = hoy - FECHA_INICIO;
            const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            
            if (dias > 0) {
                const tasaAnual = ((inter / cap) / dias) * 365 * 100;
                box.style.display = 'block';
                document.getElementById('tasaAnual1').innerText = tasaAnual.toFixed(2) + '%';
                document.getElementById('diasInfo').innerText = `Días desde el inicio: ${dias}`;
            } else {
                box.style.display = 'block';
                document.getElementById('tasaAnual1').innerText = "---";
                document.getElementById('diasInfo').innerText = "La fecha de inicio es hoy.";
            }
        } else {
            box.style.display = 'none';
        }
    }

    function calcMensual() {
        const cap = parseFloat(document.getElementById('cap2').value);
        const inter = parseFloat(document.getElementById('int2').value);
        const box = document.getElementById('resBox2');

        if (cap > 0 && inter >= 0) {
            const tasaAnual = (inter / cap) * 12 * 100;
            box.style.display = 'block';
            document.getElementById('tasaAnual2').innerText = tasaAnual.toFixed(2) + '%';
        } else {
            box.style.display = 'none';
        }
    }
</script>

</body>
</html>
