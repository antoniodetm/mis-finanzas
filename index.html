<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis Finanzas</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --res-fijo: #059669;
            --res-mensual: #1d4ed8;
            --neto-color: #0891b2;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-title {
            font-size: 2rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .card {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
            margin-bottom: 25px;
            box-sizing: border-box;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 20px;
            text-align: center;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            box-sizing: border-box;
            background-color: #f8fafc;
            text-align: center;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
        }

        .result-area {
            margin-top: 10px;
            padding: 20px 15px;
            border-radius: 20px;
            text-align: center;
            display: none;
            transition: all 0.3s ease;
        }

        .res-1 { background: #ecfdf5; border: 2px solid #10b981; }
        .res-2 { background: #eff6ff; border: 2px solid #3b82f6; }

        .res-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .res-value {
            font-size: 2.8rem; 
            font-weight: 900;
            line-height: 1;
            letter-spacing: -1px;
            margin: 5px 0;
        }

        .neto-value {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--neto-color);
            margin-bottom: 10px;
        }

        .res-1 .res-value { color: var(--res-fijo); }
        .res-2 .res-value { color: var(--res-mensual); }

        .res-detail {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #cbd5e1;
            line-height: 1.5;
        }

        .tax-info {
            color: #b91c1c;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="main-title">Mis Finanzas</div>

    <div class="card">
        <div class="section-title">Desde 27/01/2026</div>
        <div class="input-row">
            <div>
                <label>CAPITAL (€)</label>
                <input type="number" id="cap1" value="20000" oninput="calcFija()" inputmode="decimal">
            </div>
            <div>
                <label>INTERÉS (€)</label>
                <input type="number" id="int1" placeholder="Ej: 150" oninput="calcFija()" inputmode="decimal">
            </div>
        </div>

        <div id="resBox1" class="result-area res-1">
            <div class="res-label">TAE ANUAL</div>
            <div id="tasaAnual1" class="res-value">0%</div>
            <div id="info1" class="res-detail"></div>
        </div>
    </div>

    <div class="card">
        <div class="section-title">Proyección Mensual</div>
        <div class="input-row">
            <div>
                <label>CAP. TOTAL (€)</label>
                <input type="number" id="cap2" placeholder="Ej: 1008.10" oninput="calcMensual()" inputmode="decimal">
            </div>
            <div>
                <label>INT. NETO MES (€)</label>
                <input type="number" id="int2" placeholder="Ej: 8.10" oninput="calcMensual()" inputmode="decimal">
            </div>
        </div>

        <div id="resBox2" class="result-area res-2">
            <div class="res-label">INT. ANUAL BRUTO</div>
            <div id="tasaAnual2" class="res-value">0%</div>
            <div class="res-label">INTERÉS ANUAL NETO</div>
            <div id="tasaNeto2" class="neto-value">0%</div>
            <div id="info2" class="res-detail"></div>
        </div>
    </div>

<script>
    const FECHA_INICIO = new Date('2026-01-27');
    const hoy = new Date();
    const IRPF = 0.19;

    function calcFija() {
        const cap = parseFloat(document.getElementById('cap1').value);
        const inter = parseFloat(document.getElementById('int1').value);
        const box = document.getElementById('resBox1');

        if (cap > 0 && inter >= 0) {
            const dias = Math.max(0, Math.floor((hoy - FECHA_INICIO) / (1000 * 60 * 60 * 24)));
            let tasaAnual = 0;
            if (dias > 0) {
                // Cálculo directo sin deducciones ni base inversa
                tasaAnual = ((inter / cap) / dias) * 365 * 100;
            }

            box.style.display = 'block';
            document.getElementById('tasaAnual1').innerText = tasaAnual.toFixed(2) + '%';
            document.getElementById('info1').innerHTML = 
                `Rentabilidad acumulada directa<br>` +
                `<small>${dias} días transcurridos</small>`;
        } else { box.style.display = 'none'; }
    }

    function calcMensual() {
        const capTotal = parseFloat(document.getElementById('cap2').value);
        const netoMes = parseFloat(document.getElementById('int2').value);
        const box = document.getElementById('resBox2');

        if (capTotal > 0 && netoMes >= 0 && (capTotal - netoMes) > 0) {
            const capBase = capTotal - netoMes;
            const brutoMes = netoMes / (1 - IRPF);
            const impuestoMes = brutoMes - netoMes;
            
            const tasaBruta = (brutoMes / capBase) * 12 * 100;
            const tasaNeto = (netoMes / capBase) * 12 * 100;

            box.style.display = 'block';
            document.getElementById('tasaAnual2').innerText = tasaBruta.toFixed(2) + '%';
            document.getElementById('tasaNeto2').innerText = tasaNeto.toFixed(2) + '%';
            document.getElementById('info2').innerHTML = 
                `Base: <b>${capBase.toFixed(2)}€</b> | Bruto/m: <b>${brutoMes.toFixed(2)}€</b><br>` +
                `Impuesto/m: <span class="tax-info">${impuestoMes.toFixed(2)}€</span>`;
        } else { box.style.display = 'none'; }
    }

    window.onload = () => {
        if(document.getElementById('int1').value) calcFija();
        if(document.getElementById('int2').value) calcMensual();
    };
</script>

</body>
</html>
